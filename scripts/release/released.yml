# Publish-out sync manifest.
#
# `hex-dev` is the source of truth. The sync (scripts/release/sync_released.py,
# driven by .github/workflows/sync-released.yml) regenerates each released repo
# from this monorepo: it overwrites the repo's *managed* paths from here, leaves
# everything else (root + sidecar lakefiles, CI, toolchains, LICENSE,
# manifests) untouched, rewrites the root lakefile's cross-repo Hex pins to the
# commits just synced, and commits to the released repo's `main`.
#
# Order is topological (upstream first) so each repo's freshly-pushed SHA is
# known before its downstream consumers are processed.
#
# Per-repo managed path conventions (resolved by the driver):
#   <Lib>/    (minus <Lib>/SPEC/ and <Lib>/README.md)  -> <Lib>/
#   <Lib>/README.md   (unless readme: false)  -> README.md
#   <Lib>.lean        (if umbrella: true)   -> <Lib>.lean
#   <Lib>/SPEC/<spec>.md                    -> SPEC/<spec>.md
#   bench/<Lib>/       (if bench: true)      -> bench/<Lib>/
#   conformance/<Lib>/ (if conformance)      -> conformance/<Lib>/
#   conformance-fixtures/<f>/                -> conformance-fixtures/<f>/
#   scripts/oracle/<o>                       -> scripts/oracle/<o>
# `pins` lists the upstream repos whose git rev is rewritten in this repo's root
# lakefile (matched by their github URL); `lakefile` is that file's format.

repos:
  - repo: kim-em/hex-test-kit
    lib: Hex
    umbrella: false        # released HexTestKit.lean umbrella is fixed
    paths:                 # explicit: only the shared helper source
      - { src: "Hex", dest: "Hex" }
    spec: null
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: []
    lakefile: toml

  - repo: kim-em/hex-matrix
    lib: HexMatrix
    umbrella: true
    spec: hex-matrix
    bench: true                # dense multiplication
    conformance: true          # oracle-free base #guard module
    fixtures: []
    oracles: []
    pins: []
    lakefile: toml

  - repo: kim-em/hex-row-reduce
    lib: HexRowReduce
    umbrella: true
    spec: hex-row-reduce
    bench: false
    conformance: true
    fixtures: [HexRowReduce]
    oracles: [matrix_flint.py, common.py]
    pins: [hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-determinant
    lib: HexDeterminant
    umbrella: true
    spec: hex-determinant
    bench: true                # Leibniz determinant
    conformance: true
    fixtures: [HexDeterminant]
    oracles: [matrix_flint.py, common.py]
    pins: [hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-bareiss
    lib: HexBareiss
    umbrella: true
    spec: hex-bareiss
    bench: true                # Bareiss determinant + FLINT comparator
    conformance: true
    fixtures: [HexBareiss]
    oracles: [matrix_flint.py, common.py, flint_bench_driver.py]
    pins: [hex-determinant, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-matrix-mathlib
    lib: HexMatrixMathlib
    umbrella: true
    spec: hex-matrix-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-row-reduce-mathlib
    lib: HexRowReduceMathlib
    umbrella: true
    spec: hex-row-reduce-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-row-reduce, hex-matrix-mathlib, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-determinant-mathlib
    lib: HexDeterminantMathlib
    umbrella: true
    spec: hex-determinant-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-determinant, hex-bareiss, hex-matrix-mathlib, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-bareiss-mathlib
    lib: HexBareissMathlib
    umbrella: true
    spec: hex-bareiss-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-determinant-mathlib, hex-determinant, hex-bareiss, hex-matrix-mathlib, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-gram-schmidt
    lib: HexGramSchmidt
    umbrella: true
    spec: hex-gram-schmidt
    bench: true
    conformance: true
    fixtures: [HexGramSchmidt]
    oracles: [gs_flint.py, common.py]
    pins: [hex-row-reduce, hex-determinant, hex-bareiss, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-gram-schmidt-mathlib
    lib: HexGramSchmidtMathlib
    umbrella: true
    spec: hex-gram-schmidt-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-gram-schmidt, hex-bareiss-mathlib, hex-determinant-mathlib, hex-matrix-mathlib, hex-row-reduce, hex-determinant, hex-bareiss, hex-matrix]
    lakefile: toml

  - repo: kim-em/hex-lll
    lib: HexLLL
    umbrella: true
    spec: hex-lll
    bench: true
    bench_dir: HexLLLBench   # multi-file bench lives under bench/HexLLLBench/
    conformance: true
    fixtures: [HexLLL]
    oracles: [lll_fpylll.py, lll_fpylll_bench_driver.py, common.py, __init__.py, setup_fplll_ffi.sh, setup_lll_isabelle.sh, patches]
    pins: [hex-gram-schmidt, hex-row-reduce, hex-determinant, hex-bareiss, hex-matrix]
    lakefile: lean

  - repo: kim-em/hex-lll-mathlib
    lib: HexLLLMathlib
    umbrella: true
    spec: hex-lll-mathlib
    bench: false
    conformance: false
    fixtures: []
    oracles: []
    pins: [hex-lll, hex-gram-schmidt-mathlib, hex-row-reduce-mathlib, hex-determinant-mathlib, hex-bareiss-mathlib, hex-matrix-mathlib, hex-gram-schmidt, hex-row-reduce, hex-determinant, hex-bareiss, hex-matrix]
    lakefile: toml
