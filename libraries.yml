# libraries.yml — per-library structure + state.
#
# Structural fields (deps, mathlib) change rarely, only when the library
# graph changes. The state field (done_through) changes every planner
# cycle as libraries complete phases.
#
# Semantics:
# - done_through: K means phases 1..K are all complete for L (linear,
#   no skipping — enforced by the phase-dep table in PLAN/README.md).
# - done_through: 0 means no per-library phases are complete; L is
#   ready to start Phase 1 once Phase 0's global bootstrap is done.
# - done_through: 7 means L is fully done.
# - Phase 0 (monorepo bootstrap) is global; its completion is observable
#   by the existence of lakefile.lean, scripts/check_dag.py, etc., not
#   by any field in this file.
#
# This file is the single source of truth for the library graph.
# lakefile.lean entries are cross-checked against libraries.yml in CI via
# scripts/check_dag.py.

libraries:

  # ---------- Roots ----------
  HexArith:
    deps: []
    mathlib: false
    done_through: 4
  HexPoly:
    deps: []
    mathlib: false
    done_through: 4
  HexMatrix:
    deps: []
    mathlib: false
    done_through: 4

  # ---------- Depth 1 ----------
  HexModArith:
    deps: [HexArith]
    mathlib: false
    done_through: 4
  HexGramSchmidt:
    deps: [HexMatrix]
    mathlib: false
    done_through: 4
  HexGF2:
    deps: [HexPoly]
    mathlib: false
    done_through: 4
  HexPolyZ:
    deps: [HexPoly]
    mathlib: false
    done_through: 4

  # ---------- Depth 2 ----------
  HexLLL:
    deps: [HexGramSchmidt]
    mathlib: false
    done_through: 2
  HexPolyFp:
    deps: [HexPoly, HexModArith]
    mathlib: false
    done_through: 4

  # ---------- Finite-field quotient pipeline ----------
  HexGfqRing:
    deps: [HexPolyFp]
    mathlib: false
    done_through: 4
  HexGfqField:
    deps: [HexGfqRing]
    mathlib: false
    done_through: 4

  # ---------- Factoring pipeline ----------
  HexBerlekamp:
    deps: [HexPolyFp, HexMatrix, HexGfqRing]
    mathlib: false
    done_through: 4
  HexHensel:
    deps: [HexPolyFp, HexPolyZ]
    mathlib: false
    done_through: 4
  HexConway:
    deps: [HexBerlekamp]
    mathlib: false
    done_through: 3
  HexGfq:
    deps: [HexGfqField, HexConway, HexGF2]
    mathlib: false
    done_through: 3
  HexBerlekampZassenhaus:
    deps: [HexBerlekamp, HexHensel, HexLLL]
    mathlib: false
    done_through: 1

  # ---------- Mathlib bridges ----------
  HexPolyMathlib:
    deps: [HexPoly]
    mathlib: true
    done_through: 3
  HexMatrixMathlib:
    deps: [HexMatrix]
    mathlib: true
    done_through: 3
  HexModArithMathlib:
    deps: [HexModArith]
    mathlib: true
    done_through: 3
  HexGramSchmidtMathlib:
    deps: [HexGramSchmidt]
    mathlib: true
    done_through: 3
  HexPolyZMathlib:
    deps: [HexPolyZ, HexPolyMathlib]
    mathlib: true
    done_through: 3
  HexLLLMathlib:
    deps: [HexLLL, HexMatrixMathlib]
    mathlib: true
    done_through: 1
  HexBerlekampMathlib:
    deps: [HexBerlekamp, HexPolyMathlib, HexModArithMathlib]
    mathlib: true
    done_through: 2
  HexHenselMathlib:
    deps: [HexHensel, HexPolyMathlib]
    mathlib: true
    done_through: 2
  HexGF2Mathlib:
    deps: [HexGF2, HexPolyFp, HexGfqField]
    mathlib: true
    done_through: 3
  HexGfqMathlib:
    deps: [HexGfq, HexGF2Mathlib]
    mathlib: true
    done_through: 3
  HexBerlekampZassenhausMathlib:
    deps: [HexBerlekampZassenhaus, HexPolyZMathlib]
    mathlib: true
    done_through: 0
