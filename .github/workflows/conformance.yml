name: Conformance

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Intentionally NO `pull_request` trigger: conformance currently
  # takes ~30-60 min (24 min Lean compile + 5-30 min oracle runs)
  # and saturates the 20-runner pool, blocking the gating `CI`
  # workflow on every PR. Until HO-37 (#3693) ships a fix
  # (`.lake/build` cache or trimmed target set), conformance runs
  # only on push-to-`main` and via manual `workflow_dispatch`.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify conformance matrix invariant
        run: python3 scripts/conformance_targets.py --check
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libpari-dev pari-gp libfplll-dev
      - name: Install Python oracle dependencies
        run: |
          python3 -m pip install --user \
            python-flint cypari2 conway-polynomials fpylll
      - name: Set up Lean toolchain (no build)
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: false
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Verify Mathlib cache populated (hard fail on miss)
        run: bash scripts/ci/check_no_mathlib_rebuild.sh
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" \
            >> "$GITHUB_ENV"
      - name: Build conformance + emit-fixture targets (HO-37 experiment A — per-target timing)
        run: |
          # HO-37 experiment A: split the single `lake build` call into
          # 27 + 14 = 41 sequential `lake build <target>` invocations so
          # each one's wallclock surfaces independently. The total
          # wallclock should equal the original, but we now know which
          # target contributes how much. `-j 1` would serialise but also
          # forfeit any parallelism Lake's task scheduler does internally
          # for a single library compile — we want incremental, not raw.
          set -x
          for tgt in $(python3 scripts/conformance_targets.py); do
            ts=$(date +%s)
            lake build "$tgt"
            echo "TIMING: $tgt $(( $(date +%s) - ts ))s"
          done
          for emit in hexpoly_emit_fixtures hexpolyfp_emit_fixtures \
                      hexberlekamp_emit_fixtures hexmatrix_emit_fixtures \
                      hexbz_emit_fixtures hexpolyz_emit_fixtures \
                      hexgf2_emit_fixtures hexgfq_emit_fixtures \
                      hexgfqring_emit_fixtures hexgfqfield_emit_fixtures \
                      hexgramschmidt_emit_fixtures hexhensel_emit_fixtures \
                      hexconway_emit_fixtures hexlll_emit_fixtures; do
            ts=$(date +%s)
            lake build "$emit"
            echo "TIMING: $emit $(( $(date +%s) - ts ))s"
          done
      - name: Cross-check fixtures and run oracles (HO-37 experiment A — skipped to capture build timings without 6h-cancel)
        if: false
        run: bash scripts/ci/run_oracles.sh
      - name: Emit timing summary (HO-37 experiment A)
        if: always()
        run: |
          echo "=== HO-37 experiment A: per-target build timings ==="
          echo "(Cross-check + oracles step intentionally skipped on this branch)"
      - name: Upload failure records
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-failures
          path: conformance-failures/*.json
          if-no-files-found: ignore
