name: Conformance

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.derive.outputs.targets }}
    steps:
      - uses: actions/checkout@v4
      - name: Verify conformance matrix invariant
        run: python3 scripts/conformance_targets.py --check
      - id: derive
        name: Derive conformance matrix
        run: |
          targets="$(python3 scripts/conformance_targets.py --json)"
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  conformance:
    needs: setup
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /home/runner/.elan/toolchains/leanprover--lean4---v4.30.0-rc2/lib/lean
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.setup.outputs.targets) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Build ${{ matrix.target }} conformance checks
        uses: leanprover/lean-action@v1
        with:
          build-args: ${{ matrix.target }}

  oracle-pyflint:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /home/runner/.elan/toolchains/leanprover--lean4---v4.30.0-rc2/lib/lean
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev
      - name: Install python-flint
        run: python3 -m pip install --user python-flint
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Build hexpoly_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexpoly_emit_fixtures
      - name: Cross-check HexPoly Lean emission against committed fixture
        run: |
          lake exe hexpoly_emit_fixtures > /tmp/hexpoly-fresh.jsonl
          diff -u conformance-fixtures/HexPoly/poly.jsonl /tmp/hexpoly-fresh.jsonl
      - name: Run HexPoly python-flint oracle
        run: |
          lake exe hexpoly_emit_fixtures \
            | python3 scripts/oracle/poly_flint.py
      - name: Build hexberlekamp_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexberlekamp_emit_fixtures
      - name: Cross-check HexBerlekamp Lean emission against committed fixture
        run: |
          lake exe hexberlekamp_emit_fixtures > /tmp/hexberlekamp-fresh.jsonl
          diff -u conformance-fixtures/HexBerlekamp/berlekamp.jsonl \
            /tmp/hexberlekamp-fresh.jsonl
      - name: Run HexBerlekamp python-flint oracle
        run: |
          lake exe hexberlekamp_emit_fixtures \
            | python3 scripts/oracle/berlekamp_flint.py
      - name: Build hexmatrix_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexmatrix_emit_fixtures
      - name: Cross-check HexMatrix Lean emission against committed fixture
        run: |
          lake exe hexmatrix_emit_fixtures > /tmp/hexmatrix-fresh.jsonl
          diff -u conformance-fixtures/HexMatrix/matrix.jsonl \
            /tmp/hexmatrix-fresh.jsonl
      - name: Run HexMatrix python-flint oracle
        run: |
          lake exe hexmatrix_emit_fixtures \
            | python3 scripts/oracle/matrix_flint.py
      - name: Build hexbz_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexbz_emit_fixtures
      - name: Cross-check HexBerlekampZassenhaus Lean emission against committed fixture
        run: |
          lake exe hexbz_emit_fixtures > /tmp/hexbz-fresh.jsonl
          diff -u conformance-fixtures/HexBerlekampZassenhaus/bz.jsonl \
            /tmp/hexbz-fresh.jsonl
      - name: Run HexBerlekampZassenhaus python-flint oracle
        run: |
          lake exe hexbz_emit_fixtures \
            | python3 scripts/oracle/bz_flint.py
      - name: Build hexgfq_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexgfq_emit_fixtures
      - name: Cross-check HexGfq Lean emission against committed fixture
        run: |
          lake exe hexgfq_emit_fixtures > /tmp/hexgfq-fresh.jsonl
          diff -u conformance-fixtures/HexGfq/gfq.jsonl /tmp/hexgfq-fresh.jsonl
      - name: Run HexGfq python-flint oracle
        run: |
          lake exe hexgfq_emit_fixtures \
            | python3 scripts/oracle/gfq_flint.py
      - name: Build hexgramschmidt_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexgramschmidt_emit_fixtures
      - name: Cross-check HexGramSchmidt Lean emission against committed fixture
        run: |
          lake exe hexgramschmidt_emit_fixtures > /tmp/hexgramschmidt-fresh.jsonl
          diff -u conformance-fixtures/HexGramSchmidt/gram_schmidt.jsonl \
            /tmp/hexgramschmidt-fresh.jsonl
      - name: Run HexGramSchmidt python-flint oracle
        run: |
          lake exe hexgramschmidt_emit_fixtures \
            | python3 scripts/oracle/gs_flint.py
      - name: Build hexgf2_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexgf2_emit_fixtures
      - name: Cross-check HexGF2 Lean emission against committed fixture
        run: |
          lake exe hexgf2_emit_fixtures > /tmp/hexgf2-fresh.jsonl
          diff -u conformance-fixtures/HexGF2/gf2.jsonl /tmp/hexgf2-fresh.jsonl
      - name: Run HexGF2 python-flint oracle
        run: |
          lake exe hexgf2_emit_fixtures \
            | python3 scripts/oracle/gf2_flint.py
      - name: Build hexgfqfield_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexgfqfield_emit_fixtures
      - name: Cross-check HexGfqField Lean emission against committed fixture
        run: |
          lake exe hexgfqfield_emit_fixtures > /tmp/hexgfqfield-fresh.jsonl
          diff -u conformance-fixtures/HexGfqField/gfqfield.jsonl \
            /tmp/hexgfqfield-fresh.jsonl
      - name: Run HexGfqField python-flint oracle
        run: |
          lake exe hexgfqfield_emit_fixtures \
            | python3 scripts/oracle/gfqfield_flint.py
      - name: Upload failure records
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-pyflint-failures
          path: conformance-failures/*.json
          if-no-files-found: ignore

  oracle-pari:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /home/runner/.elan/toolchains/leanprover--lean4---v4.30.0-rc2/lib/lean
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libpari-dev pari-gp
      - name: Install cypari2
        run: python3 -m pip install --user cypari2
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Build hexhensel_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexhensel_emit_fixtures
      - name: Cross-check Lean emission against committed fixture
        run: |
          lake exe hexhensel_emit_fixtures > /tmp/hexhensel-fresh.jsonl
          diff -u conformance-fixtures/HexHensel/hensel.jsonl /tmp/hexhensel-fresh.jsonl
      - name: Run PARI oracle
        run: |
          lake exe hexhensel_emit_fixtures \
            | python3 scripts/oracle/hensel_pari.py
      - name: Upload failure records
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-pari-failures
          path: conformance-failures/*.json
          if-no-files-found: ignore

  oracle-fpylll:
    runs-on: ubuntu-latest
    env:
      LD_LIBRARY_PATH: /home/runner/.elan/toolchains/leanprover--lean4---v4.30.0-rc2/lib/lean
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgmp-dev libfplll-dev
      - name: Install fpylll and python-flint
        run: python3 -m pip install --user fpylll python-flint
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
      - name: Build hexlll_emit_fixtures
        uses: leanprover/lean-action@v1
        with:
          build-args: hexlll_emit_fixtures
      - name: Cross-check Lean emission against committed fixture
        run: |
          lake exe hexlll_emit_fixtures > /tmp/hexlll-fresh.jsonl
          diff -u conformance-fixtures/HexLLL/lll.jsonl /tmp/hexlll-fresh.jsonl
      - name: Run fpylll oracle
        run: |
          lake exe hexlll_emit_fixtures \
            | python3 scripts/oracle/lll_fpylll.py
      - name: Upload failure records
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: oracle-fpylll-failures
          path: conformance-failures/*.json
          if-no-files-found: ignore
