name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/check_dag.py
      - run: python3 scripts/check_phase4.py
      - name: Lint benches are Mathlib-free (SPEC/benchmarking.md §Mathlib-free benches)
        run: python3 scripts/ci/check_benches_mathlib_free.py
      - run: sudo apt-get install -y libgmp-dev libfplll-dev libntl-dev
      - name: Install Python bench comparator dependencies
        run: python3 -m pip install --user cysignals fpylll python-flint
      - name: Set up Lean toolchain (no build)
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: false
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Verify Mathlib cache populated (hard fail on miss)
        run: bash scripts/ci/check_no_mathlib_rebuild.sh
      - name: Configure Lean shared library path
        run: |
          toolchain="$(sed 's|/|--|; s|:|---|' lean-toolchain)"
          echo "LD_LIBRARY_PATH=$HOME/.elan/toolchains/$toolchain/lib/lean:${LD_LIBRARY_PATH:-}" \
            >> "$GITHUB_ENV"
      - name: Restore .lake/build (Hex modules only)
        uses: actions/cache@v4
        with:
          path: |
            .lake/build/lib/lean/Hex*
            .lake/build/ir/Hex*
          key: lake-build-${{ github.workflow }}-${{ github.run_id }}
          restore-keys: |
            lake-build-${{ github.workflow }}-
      - name: Restore Isabelle install + AFP session heap
        # The verified-Isabelle BZ comparator
        # (`Hex.BZBench.runIsabelle*Checksum`) needs Isabelle on PATH
        # plus a precomputed `Berlekamp_Zassenhaus` session heap.
        # `scripts/oracle/setup_bz_isabelle.sh` downloads the dated AFP
        # archive, builds the session, extracts a Haskell driver and
        # compiles it; the cache survives runs while the script + AFP
        # pin + wrapper-theory files are unchanged. See
        # `SPEC/Libraries/hex-berlekamp-zassenhaus.md` §"External
        # comparators" for the comparator's gating role.
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.tool_cache }}/isabelle/Isabelle2025-2
            ~/.isabelle/Isabelle2025-2/heaps
            .cache/oracles/bz-isabelle
          key: isabelle-2025-2-${{ hashFiles('scripts/oracle/setup_bz_isabelle.sh', 'scripts/oracle/bz-isabelle/**') }}
      - name: Install Isabelle 2025-2 (cold cache only)
        run: |
          isabelle_root="${{ runner.tool_cache }}/isabelle/Isabelle2025-2"
          if [ ! -x "${isabelle_root}/bin/isabelle" ]; then
            mkdir -p "${{ runner.tool_cache }}/isabelle"
            curl -L --fail --retry 5 --retry-delay 10 \
              -o /tmp/isabelle.tar.gz \
              "https://www.cl.cam.ac.uk/research/hvg/Isabelle/dist/Isabelle2025-2_linux.tar.gz"
            tar -xzf /tmp/isabelle.tar.gz -C "${{ runner.tool_cache }}/isabelle"
            rm -f /tmp/isabelle.tar.gz
          fi
          echo "${isabelle_root}/bin" >> "$GITHUB_PATH"
      - name: Build hex (Mathlib must NOT rebuild from source)
        # Build the bench-exes here, not in the `Bench verify` step.
        # Otherwise the first `lake exe X_bench list` in that step
        # would pay the bench-exe's first compile (~6 min for the
        # heaviest one) and the wallclock breakdown would conflate
        # build time with verify time. Bench verify itself is fast
        # since lean-bench's verify path runs in-process.
        run: |
          lake build \
            hexarith_bench hexmatrix_bench hexpoly_bench hexpolyz_bench \
            hexpolyfp_bench hexmodarith_bench hexgramschmidt_bench \
            hexgf2_bench hexgfqring_bench hexgfqfield_bench hexgfq_bench \
            hexlll_bench hexhensel_bench hexberlekamp_bench hexbz_bench \
            hexconway_bench
      - name: Bench verify (smoke gate per SPEC/benchmarking.md §CI integration)
        env:
          # Hard cap enforced per SPEC/benchmarking.md §CI integration
          # "Time budget". The full 16-bench verify step includes the
          # large fixed comparator smoke rungs for hexgf2_bench and
          # hexlll_bench; 360 s leaves a narrow variance buffer while
          # still flagging per-spawn-overhead regressions.
          BENCH_VERIFY_HARD_CAP_SECONDS: "360"
        run: |
          HEX_LLL_ISABELLE_SVP="$(scripts/oracle/setup_lll_isabelle.sh)"
          export HEX_LLL_ISABELLE_SVP
          HEX_BZ_ISABELLE="$(scripts/oracle/setup_bz_isabelle.sh)"
          export HEX_BZ_ISABELLE
          bash scripts/ci/check_bench_verify_budget.sh \
            hexarith_bench hexmatrix_bench hexpoly_bench hexpolyz_bench \
            hexpolyfp_bench hexmodarith_bench hexgramschmidt_bench \
            hexgf2_bench hexgfqring_bench hexgfqfield_bench hexgfq_bench \
            hexlll_bench hexhensel_bench hexberlekamp_bench hexbz_bench \
            hexconway_bench

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: python3 scripts/check_dag.py
      - run: brew install gmp
      - name: Set up Lean toolchain (no build)
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          use-mathlib-cache: false
      - name: Fetch Mathlib cache
        run: lake exe cache get
      - name: Verify Mathlib cache populated (hard fail on miss)
        run: bash scripts/ci/check_no_mathlib_rebuild.sh
      - name: Build hex (dyld symbol-resolution cross-check)
        run: lake build
